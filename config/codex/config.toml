[features]
shell_snapshot = true
collaboration_modes = false
steer = false
unified_exec = false
requires_openai_auth = true
voice_transcription = true

[projects."/home/inm/workspace/bloc"]
trust_level = "trusted"

[projects."/home/inm/.codex"]
trust_level = "trusted"

[projects."/home/inm/dotfiles"]
trust_level = "trusted"

[mcp_servers.context7]
args = ["-y", "@upstash/context7-mcp", "--api-key", "ctx7sk-97b036eb-fec9-4616-8392-8c46bba62104"]
command = "npx"
startup_timeout_ms = 20_000

[mcp_servers.arxiv]
args = ["tool", "run", "arxiv-mcp-server", "--storage-path", "/home/inm/.codex/mcp-data/arxiv/papers"]
command = "uv"
startup_timeout_ms = 60_000

[mcp_servers.paper_search]
args = ["--from", "paper-search-mcp", "python", "-m", "paper_search_mcp.server"]
command = "uvx"
startup_timeout_ms = 60_000

[mcp_servers.semantic_scholar]
args = ["--from", "fastmcp<3", "--with", "httpx", "--with", "python-dotenv", "--with", "fastapi>=0.115.0", "--with", "uvicorn>=0.32.0", "fastmcp", "run", "/home/inm/.codex/vendor/semantic-scholar-fastmcp-mcp-server/run.py"]
command = "uvx"
startup_timeout_ms = 60_000

[mcp_servers.zotero]
args = ["--from", "zotero-mcp", "zotero-mcp", "--transport", "stdio"]
command = "uvx"
startup_timeout_ms = 60_000

[mcp_servers.zotero.env]
ZOTERO_LOCAL = "true"
