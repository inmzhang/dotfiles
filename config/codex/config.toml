model = "gpt-5.3-codex-spark"
review_model = "gpt-5.4"
project_doc_fallback_filenames = ["CLAUDE.md"] # Fallback when AGENTS.md is not present.
approval_policy = "on-request"
sandbox_mode = "danger-full-access"
model_context_window = 1000000
model_auto_compact_token_limit = 700000
tool_output_token_limit = 40000 # Higher than the default to avoid truncating large tool output.
model_reasoning_summary = "auto" # Valid values: auto, concise, detailed, none.
disable_response_storage = true
network_access = "enabled"
web_search = "live"
collaboration_mode = true
suppress_unstable_features_warning = true
plan_mode_reasoning_effort = "high"
service_tier = "fast"
model_reasoning_effort = "medium"

[features]
shell_tool = true
apply_patch_freeform = true # Keep this enabled to use freeform `apply_patch`.
shell_snapshot = true
undo = true
steer = true
prevent_idle_sleep = true
unified_exec = false
requires_openai_auth = true
memories = false
fast_mode = true # Preferred here, though it increases GPT-5.4 usage.
tool_suggest = false # Disabled because local discoverable tool suggestions hit 403s.

[memories]
consolidation_model = "gpt-5.4"
extract_model = "gpt-5.4"
use_memories = false # When enabled, `memory_summary.md` is injected into developer instructions.
max_raw_memories_for_consolidation = 512
max_unused_days = 30
max_rollout_age_days = 45

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = true # Allow access to environment entries normally excluded by default.

[sandbox_workspace_write]
network_access = true # Allow outbound network access inside the sandbox.

[tui]
notifications = true

# Optional wrapper for centralized notification preferences.
# notify = []

# project_doc_max_bytes = 32768 # Max bytes loaded from AGENTS.md into first-turn instructions.

status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-remaining", "five-hour-limit", "context-window-size", "used-tokens", "context-used", "fast-mode"]

[notice]
hide_rate_limit_model_nudge = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.3-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"

[projects."/home/inm/workspace/bloc"]
trust_level = "trusted"

[projects."/home/inm/.codex"]
trust_level = "trusted"

[projects."/home/inm/dotfiles"]
trust_level = "trusted"

[projects."/home/inm/workspace/cotext"]
trust_level = "trusted"

[projects."/home/inm/open-source-project/qrippy"]
trust_level = "trusted"

[projects."/home/inm/open-source-project/tuicr"]
trust_level = "trusted"

[projects."/home/inm/open-source-project/copanion"]
trust_level = "trusted"

[projects."/home/inm/open-source-project/Stim"]
trust_level = "trusted"

[projects."/home/inm/open-source-project/ppr"]
trust_level = "trusted"

[projects."/home/inm/open-source-project/codex"]
trust_level = "trusted"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp", "--api-key", "ctx7sk-97b036eb-fec9-4616-8392-8c46bba62104"]
startup_timeout_sec = 20.0

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.openaiDeveloperDocs.tools.search_openai_docs]
approval_mode = "approve"

[agents]
max_threads = 6
max_depth = 2

[lsp.servers.rust-analyzer]
command = "rust-analyzer"
args = ["--stdio"]
extension_to_language = { rs = "rust" }
